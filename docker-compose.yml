version: '3.8'

# ==================== UNIFIED COMPOSE (dev + prod) ====================
#
# ── LOCAL DEV ──────────────────────────────────────────────────────────
#   รันครั้งแรก   : docker compose --profile dev up -d
#   Update backend : docker compose --profile dev up -d --build --no-deps backend-dev
#   Update frontend: docker compose --profile dev up -d --build --no-deps frontend-dev
#   หยุดทั้งหมด   : docker compose --profile dev down
#
# ── PRODUCTION ─────────────────────────────────────────────────────────
#   รันครั้งแรก   : docker compose --profile prod up -d --build
#   Update backend : docker compose --profile prod up -d --build --no-deps backend
#   Update frontend: docker compose --profile prod up -d --build --no-deps frontend
#   หยุดทั้งหมด   : docker compose --profile prod down
#
# ⚠️  ห้ามรัน: docker compose down -v  (จะลบ volume ข้อมูล DB)
# ======================================================================

services:

  # ─────────────────────────────────────────────
  # DATABASE — ทำงานทั้ง dev และ prod
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: thaitechzone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-thaitechzone}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-thaitechzone2024}
      POSTGRES_DB: ${DB_NAME:-thaitechzone_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"   # dev: เปิดไว้ | prod: ปิดด้วย DB_PORT= ใน .env
    networks:
      - thaitechzone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-thaitechzone} -d ${DB_NAME:-thaitechzone_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # PGADMIN — dev เท่านั้น
  # ─────────────────────────────────────────────
  pgadmin:
    profiles: [dev]
    image: dpage/pgadmin4:latest
    container_name: thaitechzone-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@thaitechzone.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - thaitechzone-network
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # BACKEND DEV — hot-reload ด้วย nodemon
  # ─────────────────────────────────────────────
  backend-dev:
    profiles: [dev]
    build:
      context: ./backend
      target: development
    container_name: thaitechzone-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - thaitechzone-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # FRONTEND DEV — hot-reload ด้วย Vite
  # ─────────────────────────────────────────────
  frontend-dev:
    profiles: [dev]
    image: node:20-alpine
    container_name: thaitechzone-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - thaitechzone-network
    depends_on:
      backend-dev:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # BACKEND PROD — built image, ไม่ expose port
  # nginx รับ request แทน
  # ─────────────────────────────────────────────
  backend:
    profiles: [prod]
    build:
      context: ./backend
      target: production
    image: thaitechzone-backend:latest
    container_name: thaitechzone-backend
    restart: always
    env_file:
      - .env.production
    environment:
      DB_HOST: postgres
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - thaitechzone-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # FRONTEND PROD — built image, ไม่ expose port
  # ─────────────────────────────────────────────
  frontend:
    profiles: [prod]
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: /api
    image: thaitechzone-frontend:latest
    container_name: thaitechzone-frontend
    restart: always
    networks:
      - thaitechzone-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # NGINX PROD — reverse proxy
  # expose port 8080 → Nginx Proxy Manager forward มาที่นี่
  # ─────────────────────────────────────────────
  nginx:
    profiles: [prod]
    image: nginx:alpine
    container_name: thaitechzone-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - thaitechzone-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:          # ⚠️ ข้อมูล DB — ห้ามลบ
  uploads_data:           # ⚠️ ไฟล์ที่ upload — ห้ามลบ
  pgadmin_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  thaitechzone-network:
    driver: bridge
