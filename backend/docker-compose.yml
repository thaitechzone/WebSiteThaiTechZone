version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: thaitechzone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: thaitechzone
      POSTGRES_PASSWORD: thaitechzone2024
      POSTGRES_DB: thaitechzone_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - thaitechzone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thaitechzone -d thaitechzone_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (Optional - Database management tool)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: thaitechzone-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@thaitechzone.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - thaitechzone-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  thaitechzone-network:
    driver: bridge
